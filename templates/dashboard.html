<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H.I.P Engine - Real-time Enterprise Telemetry</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    
    <!-- Navbar -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🚀</span>
            <h1 class="text-xl font-bold tracking-wider text-blue-400">S.H.I.P ENGINE <span class="text-xs px-2 py-0.5 bg-blue-900/50 text-blue-300 rounded border border-blue-700">DEVPLAY 6</span></h1>
        </div>
        <div class="flex items-center space-x-2">
            <span class="inline-block w-3 h-3 rounded-full bg-green-500 animate-pulse" id="ws-status-dot"></span>
            <span class="text-sm text-gray-400" id="ws-status-text">Connecting WebSocket...</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Analytics & Stats -->
        <div class="space-y-6 lg:col-span-1">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl grid grid-cols-2 gap-4">
                <div class="bg-gray-900/60 p-4 rounded-lg border border-gray-800">
                    <p class="text-xs text-gray-400 font-semibold uppercase">Total Incidents</p>
                    <p class="text-3xl font-bold text-red-400 mt-1" id="stat-incidents">0</p>
                </div>
                <div class="bg-gray-900/60 p-4 rounded-lg border border-gray-800">
                    <p class="text-xs text-gray-400 font-semibold uppercase">Avg MTTR</p>
                    <p class="text-3xl font-bold text-green-400 mt-1" id="stat-mttr">0.0s</p>
                </div>
            </div>
            
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h3 class="text-sm font-semibold text-gray-400 mb-4 uppercase tracking-wide">Incident Load Chart</h3>
                <canvas id="incidentChart" class="w-full"></canvas>
            </div>
        </div>

        <!-- Right Column: Real-time Feed & Multi-Agent Reasoning -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl flex flex-col h-[500px]">
                <h3 class="text-sm font-semibold text-gray-400 mb-4 uppercase tracking-wide">Live Event Stream Logs</h3>
                
                <div id="log-container" class="flex-1 overflow-y-auto space-y-3 pr-2 font-mono text-xs">
                    <div class="p-3 bg-gray-900 rounded border border-gray-800 text-gray-500">
                        [SYSTEM LOG] Telemetry stream initialized. Awaiting autonomous payload events...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configurate Simple Bar/Line Chart.js
        const ctx = document.getElementById('incidentChart').getContext('2d');
        let incidentCount = 0;
        const incidentChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Start', 'Current'],
                datasets: [{
                    label: 'Incidents Trapped',
                    data: [0, 0],
                    borderColor: '#f87171',
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true, grid: { color: '#374151' } }, x: { grid: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });

        // Automatically connected to FastAPI Backend Websocket Network
        const ws = new WebSocket(`ws://${window.location.host}/ws/telemetry`);

        ws.onopen = () => {
            document.getElementById('ws-status-dot').className = "inline-block w-3 h-3 rounded-full bg-green-500 animate-pulse";
            document.getElementById('ws-status-text').innerText = "Telemetry Connected (Live)";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logContainer = document.getElementById('log-container');
            const newLog = document.createElement('div');
            newLog.className = "p-3 rounded border shadow-inner mb-2 transition-all duration-300 ";

            if (data.event === "INCIDENT_INTERCEPTED") {
                incidentCount++;
                document.getElementById('stat-incidents').innerText = incidentCount;
                
                // Update Chart
                incidentChart.data.labels.push(new Date().toLocaleTimeString());
                incidentChart.data.datasets[0].data.push(incidentCount);
                incidentChart.update();

                newLog.className += "bg-red-950/40 border-red-900/60 text-red-300";
                newLog.innerHTML = `
                    <div class="font-bold text-red-400">[🚨 ALERT - INCIDENT INTERCEPTED #${data.incident_id}]</div>
                    <div class="mt-1 text-gray-400">Agent 1 (RCA) Processing Stack Trace...</div>
                    <div class="mt-2 p-2 bg-gray-950/60 rounded border border-red-950 text-gray-400 overflow-x-auto">${data.error_log}</div>
                `;
            } 
            else if (data.event === "PATCH_COMPILED") {
                newLog.className += "bg-blue-950/40 border-blue-900/60 text-blue-300";
                newLog.innerHTML = `
                    <div class="font-bold text-blue-400">[🧠 MULTI-AGENT REASONING SUCCESS]</div>
                    <div class="text-xs text-amber-400 mt-1"><strong>Agent 1 RCA Diagnosis:</strong> ${data.diagnosis}</div>
                    <div class="mt-2 text-gray-400">Agent 2 Generated Sanitized Hotfix Patch. Forwarding to compliance checkpoint...</div>
                `;
            }
            else if (data.event === "DEPLOY_SUCCESS") {
                document.getElementById('stat-mttr').innerText = "2.8s"; // Simulasi MTTR Kecepatan AI
                newLog.className += "bg-green-950/40 border-green-900/60 text-green-300";
                newLog.innerHTML = `
                    <div class="font-bold text-green-400">[🟢 AUTO-HEAL DEPLOYED SUCCESS]</div>
                    <div class="mt-1">Hotfix successfully injected into secure sandbox boundary:</div>
                    <div class="text-gray-400 italic text-[11px] mt-0.5">${data.secured_path}</div>
                `;
            }

            logContainer.prepend(newLog);
        };

        ws.onclose = () => {
            document.getElementById('ws-status-dot').className = "inline-block w-3 h-3 rounded-full bg-red-500";
            document.getElementById('ws-status-text').innerText = "Telemetry Disconnected";
        };
    </script>
</body>
</html>
